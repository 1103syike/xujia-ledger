    <div
      *ngIf="open"
      class="fixed inset-0 z-50 flex items-center justify-center px-6"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      [attr.aria-describedby]="messageId"
    >
      <button
        type="button"
        class="absolute inset-0 bg-ink/25 backdrop-blur-[2px] motion-overlay"
        [@dialogOverlay]
        aria-label="取消"
        (click)="cancel()"
      ></button>

      <div
        class="relative w-full max-w-sm rounded-3xl bg-white p-5 shadow-2xl motion-dialog-panel"
        [@dialogPanel]
        (click)="$event.stopPropagation()"
      >
        <p [id]="titleId" class="section-title">{{ title }}</p>
        <p *ngIf="detail" class="item-title mt-2">{{ detail }}</p>
        <p [id]="messageId" class="helper-text mt-2">{{ message }}</p>

        <div class="mt-5 flex gap-2" *ngIf="!stayPrimary; else stayPrimaryActions">
          <button
            type="button"
            class="btn-secondary btn-sm flex-1"
            [disabled]="busy"
            (click)="cancel()"
          >
            {{ cancelLabel }}
          </button>
          <button
            type="button"
            class="btn-sm flex-1"
            [class.btn-danger]="destructive"
            [class.btn-primary]="!destructive"
            [disabled]="busy"
            (click)="confirm()"
          >
            {{ busy ? busyLabel : confirmLabel }}
          </button>
        </div>

        <ng-template #stayPrimaryActions>
          <div class="mt-5 flex gap-2">
            <button
              type="button"
              class="btn-danger btn-sm flex-1"
              [disabled]="busy"
              (click)="confirm()"
            >
              {{ discardLabel }}
            </button>
            <button
              type="button"
              class="btn-primary btn-sm flex-1"
              [disabled]="busy"
              (click)="cancel()"
            >
              {{ stayLabel }}
            </button>
          </div>
        </ng-template>
      </div>
    </div>

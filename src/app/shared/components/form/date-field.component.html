    <div class="field-group date-field-wrap" #root>
      <label class="field-label">{{ label }}</label>
      <button
        type="button"
        class="date-field"
        [disabled]="disabled"
        [attr.aria-expanded]="open"
        aria-haspopup="dialog"
        (click)="toggleOpen($event)"
      >
        <span
          class="date-field__display min-w-0 truncate"
          [class.date-field__display--empty]="!value"
        >
          {{ displayLabel }}
        </span>
        <svg
          class="date-field__icon"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M5.75 2a.75.75 0 01.75.75V4h7V2.75a.75.75 0 011.5 0V4h.25A2.75 2.75 0 0118 6.75v8.5A2.75 2.75 0 0115.25 18H4.75A2.75 2.75 0 012 15.25v-8.5A2.75 2.75 0 014.75 4H5V2.75A.75.75 0 015.75 2zm-1 5.5c-.69 0-1.25.56-1.25 1.25v6.5c0 .69.56 1.25 1.25 1.25h10.5c.69 0 1.25-.56 1.25-1.25v-6.5c0-.69-.56-1.25-1.25-1.25H4.75z"
            clip-rule="evenodd"
          />
        </svg>
      </button>

      <div
        *ngIf="open"
        class="date-picker"
        role="dialog"
        aria-label="選擇日期"
        (click)="$event.stopPropagation()"
      >
        <div class="date-picker__header">
          <button
            type="button"
            class="date-picker__nav date-picker__nav--prev"
            aria-label="上個月"
            (click)="prevMonth($event)"
          >
            <svg class="date-picker__nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path
                fill-rule="evenodd"
                d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
          <p class="date-picker__title">{{ monthTitle }}</p>
          <button
            type="button"
            class="date-picker__nav date-picker__nav--next"
            aria-label="下個月"
            (click)="nextMonth($event)"
          >
            <svg class="date-picker__nav-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path
                fill-rule="evenodd"
                d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
        </div>

        <div class="date-picker__weekdays" aria-hidden="true">
          <span *ngFor="let weekLabel of weekLabels" class="date-picker__weekday">
            {{ weekLabel }}
          </span>
        </div>

        <div class="date-picker__grid">
          <button
            *ngFor="let cell of cells"
            type="button"
            class="date-picker__day"
            [class.date-picker__day--muted]="!cell.inMonth"
            [class.date-picker__day--today]="cell.isToday && !cell.isSelected"
            [class.date-picker__day--selected]="cell.isSelected"
            [attr.aria-label]="cell.iso"
            [attr.aria-pressed]="cell.isSelected"
            (click)="selectDate(cell.iso, $event)"
          >
            {{ cell.day }}
          </button>
        </div>

        <div class="date-picker__footer">
          <button type="button" class="date-picker__action" (click)="clear($event)">
            清除
          </button>
          <button type="button" class="date-picker__action" (click)="pickToday($event)">
            今天
          </button>
        </div>
      </div>
    </div>

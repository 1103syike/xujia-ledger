    <div
      *ngIf="rows.length > 0"
      class="member-net-chips"
      [class.mt-3]="!compact"
      [style.--member-net-cols]="columnCount"
    >
      <div
        *ngFor="let row of rows"
        class="member-net-chip"
        [class.text-debt]="rowAmount(row) < 0"
        [class.text-positive]="rowAmount(row) > 0"
        [style.background-color]="
          memberColorSoftBg(auth.getMember(row.memberId)?.color || '')
        "
        [style.box-shadow]="
          'inset 0 0 0 1px ' +
          memberColorBorder(auth.getMember(row.memberId)?.color || '')
        "
      >
        <app-member-avatar
          *ngIf="auth.getMember(row.memberId) as member"
          [member]="member"
          size="xs"
        />
        <span *ngIf="showName" class="member-net-chip__name">{{
          memberName(row.memberId)
        }}</span>
        <span class="member-net-chip__amount">
          <ng-container *ngIf="rowAmount(row) < 0">{{ formatOwe(-rowAmount(row)) }}</ng-container>
          <ng-container *ngIf="rowAmount(row) > 0">{{ formatOwed(rowAmount(row)) }}</ng-container>
        </span>
      </div>
    </div>

<div
  *ngIf="open"
  class="fixed inset-0 z-50"
  role="dialog"
  aria-modal="true"
  aria-label="版本歷程"
>
  <button
    type="button"
    class="absolute inset-0 bg-ink/25 backdrop-blur-[2px] motion-overlay"
    [@sheetOverlay]
    aria-label="關閉"
    (click)="close()"
  ></button>

  <div
    class="version-history-sheet motion-sheet-panel absolute bottom-0 left-0 right-0 mx-auto max-w-md rounded-t-3xl bg-white shadow-2xl"
    [@sheetPanel]
    (click)="$event.stopPropagation()"
  >
    <div class="flex justify-center pt-3">
      <span class="h-1 w-10 rounded-full bg-peach/40"></span>
    </div>

    <header class="version-history-sheet__head px-5 pb-3 pt-2">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0 flex-1">
          <h3 class="sheet-title">版本歷程</h3>
          <p class="helper-text mt-1 mb-0">
            目前版本
            <span class="version-history-sheet__current">v{{ currentVersion }}</span>
            <span class="version-history-sheet__legend">· 實心為目前版本 · 點可摺疊</span>
          </p>
        </div>
        <button
          type="button"
          class="caption-text shrink-0 rounded-full px-3 py-1 active:bg-cream"
          (click)="close()"
        >
          關閉
        </button>
      </div>
    </header>

    <div class="version-history-sheet__scroll px-5 pb-5">
      <ol class="version-history-sheet__list">
        <li
          *ngFor="let group of groups; trackBy: trackGroup"
          class="version-history-sheet__group"
          [class.version-history-sheet__group--open]="isLineExpanded(group.line)"
        >
          <div class="version-history-sheet__item version-history-sheet__item--major">
            <div class="version-history-sheet__marker" aria-hidden="true">
              <span
                class="version-history-sheet__dot"
                [class.version-history-sheet__dot--solid]="isCurrentLine(group.line)"
                [class.version-history-sheet__dot--hollow]="!isCurrentLine(group.line)"
              ></span>
            </div>

            <button
              type="button"
              class="version-history-sheet__major min-w-0 flex-1"
              [attr.aria-expanded]="isLineExpanded(group.line)"
              (click)="toggleLine(group.line, $event)"
            >
              <div class="version-history-sheet__major-inner">
                <span
                  *ngIf="isCurrentLine(group.line)"
                  class="version-history-sheet__latest-badge"
                >最新版本</span>
                <span class="version-history-sheet__major-version">v{{ group.line }}</span>
                <time class="version-history-sheet__major-date">{{ formatReleaseDate(group.major) }}</time>
                <span class="version-history-sheet__major-chevron" aria-hidden="true">
                  {{ isLineExpanded(group.line) ? '▾' : '▸' }}
                </span>
              </div>
            </button>
          </div>

          <div
            class="version-history-sheet__minors"
            [class.version-history-sheet__minors--open]="isLineExpanded(group.line)"
          >
            <div class="version-history-sheet__minors-inner">
              <div
                *ngFor="let release of group.minors; trackBy: trackRelease"
                class="version-history-sheet__item"
              >
                <div class="version-history-sheet__marker" aria-hidden="true">
                  <span
                    class="version-history-sheet__dot"
                    [class.version-history-sheet__dot--solid]="isCurrentRelease(release.version)"
                    [class.version-history-sheet__dot--hollow]="!isCurrentRelease(release.version)"
                  ></span>
                </div>

                <article class="version-history-sheet__card min-w-0 flex-1">
                  <div class="version-history-sheet__meta">
                    <span
                      *ngIf="isCurrentRelease(release.version)"
                      class="version-history-sheet__latest-badge"
                    >最新版本</span>
                    <span class="version-history-sheet__version">v{{ release.version }}</span>
                    <time class="version-history-sheet__date">{{ formatReleaseDate(release) }}</time>
                  </div>
                  <h4 *ngIf="release.title" class="version-history-sheet__title">{{ release.title }}</h4>

                  <ul *ngIf="release.highlights.length" class="version-history-sheet__bullets">
                    <li *ngFor="let item of release.highlights">{{ item }}</li>
                  </ul>

                  <ng-container *ngIf="release.sections?.length">
                    <div
                      *ngFor="let section of release.sections"
                      class="version-history-sheet__section"
                    >
                      <p class="version-history-sheet__section-title">{{ section.heading }}</p>
                      <ul class="version-history-sheet__bullets">
                        <li *ngFor="let item of section.items">{{ item }}</li>
                      </ul>
                    </div>
                  </ng-container>
                </article>
              </div>
            </div>
          </div>
        </li>
      </ol>
    </div>
  </div>
</div>
